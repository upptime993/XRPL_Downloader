<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Downloader - Dark Edition</title>
    
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png"> <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    </head>
    
    <!-- Fonts: Plus Jakarta Sans for modern tech look -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                        mono: ['ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', 'monospace'],
                    },
                    colors: {
                        dark: {
                            bg: '#0B0F19',
                            card: '#131A2A',
                            input: '#1A2235',
                            border: '#1E293B',
                        },
                        brand: {
                            cyan: '#00E5FF',
                            purple: '#A855F7',
                            blue: '#3B82F6',
                        }
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    }
                }
            }
        }
    </script>

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { background-color: #0B0F19; color: #ffffff; }
        .bg-gradient-primary { background: linear-gradient(135deg, #38bdf8 0%, #a855f7 100%); }
        .text-gradient { 
            background: linear-gradient(135deg, #38bdf8 0%, #a855f7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #0B0F19; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1E293B; border-radius: 4px; }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col selection:bg-brand-purple selection:text-white">
    <div id="root" class="flex-grow flex flex-col relative overflow-hidden"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- KONFIGURASI API ---
        const API_BASE = 'https://api.sonzaix.indevs.in';
        const DRAKOR_API = 'https://api.sonzaix.indevs.in/drama';

        // --- HELPER FUNCTIONS ---
        const formatSize = (bytes) => {
            if (!bytes || isNaN(bytes)) return 'N/A';
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(1024));
            return `${(bytes / Math.pow(1024, i)).toFixed(2)} ${sizes[i]}`;
        };

        const extractEpNumber = (chapter) => {
            const chMatch = String(chapter.ch).match(/^(\d+)/);
            if (chMatch) return parseInt(chMatch[1]);
            const urlMatch = String(chapter.url).match(/-(\d+)$/);
            if (urlMatch) return parseInt(urlMatch[1]);
            return 1;
        };

        // --- KOMPONEN UTAMA ---
        const App = () => {
            const [activeTab, setActiveTab] = useState('sosmed'); // 'sosmed' | 'movie'
            
            // Re-initialize icons every render
            useEffect(() => {
                lucide.createIcons();
            });

            return (
                <>
                    {/* Background Ornaments (Constellations/Nodes) */}
                    <div className="absolute top-0 left-0 w-full h-full overflow-hidden -z-10 pointer-events-none opacity-20">
                        <div className="absolute top-20 left-10 w-2 h-2 bg-brand-cyan rounded-full shadow-[0_0_15px_#00E5FF]"></div>
                        <div className="absolute top-40 right-20 w-3 h-3 bg-brand-purple rounded-full shadow-[0_0_20px_#A855F7]"></div>
                        <div className="absolute bottom-40 left-1/4 w-1.5 h-1.5 bg-blue-400 rounded-full"></div>
                        <div className="absolute top-1/3 right-1/3 w-32 h-32 bg-brand-purple/20 blur-[100px] rounded-full"></div>
                        <div className="absolute bottom-1/4 left-1/3 w-40 h-40 bg-brand-cyan/10 blur-[100px] rounded-full"></div>
                    </div>

                    {/* Navbar - Tombol menu dihapus & diubah ke tengah (atau menyesuaikan) */}
                    <header className="border-b border-dark-border bg-dark-bg/80 backdrop-blur-md sticky top-0 z-40">
                        <div className="max-w-5xl mx-auto px-4 h-16 flex items-center justify-center md:justify-start">
                            <div className="font-mono text-2xl font-bold tracking-tight">
                                &lt;<span className="text-[#38bdf8]">Cepat</span><span className="text-[#a855f7]">_Save</span>/&gt;
                            </div>
                        </div>
                    </header>

                    <main className="max-w-4xl mx-auto px-4 pt-10 pb-20 w-full flex-grow flex flex-col">
                        
                        {/* Tab Selector */}
                        <div className="flex bg-dark-card border border-dark-border p-1 rounded-2xl mb-8 self-center">
                            <button 
                                onClick={() => setActiveTab('sosmed')}
                                className={`px-6 py-2.5 rounded-xl font-semibold text-sm transition-all duration-300 ${activeTab === 'sosmed' ? 'bg-slate-800 text-white shadow-lg' : 'text-slate-400 hover:text-slate-200'}`}
                            >
                                <div className="flex items-center gap-2">
                                    <i data-lucide="smartphone" className="w-4 h-4"></i>
                                    Sosial Media
                                </div>
                            </button>
                            <button 
                                onClick={() => setActiveTab('movie')}
                                className={`px-6 py-2.5 rounded-xl font-semibold text-sm transition-all duration-300 ${activeTab === 'movie' ? 'bg-slate-800 text-white shadow-lg' : 'text-slate-400 hover:text-slate-200'}`}
                            >
                                <div className="flex items-center gap-2">
                                    <i data-lucide="film" className="w-4 h-4"></i>
                                    Anime / Movie
                                </div>
                            </button>
                        </div>

                        {/* Content Area */}
                        {activeTab === 'sosmed' ? <SosmedDownloader /> : <MovieDownloader />}
                    </main>

                    {/* Footer dengan credit @ikbal developer */}
                    <footer className="mt-auto border-t border-dark-border py-8 bg-dark-bg text-center">
                        <div className="font-mono text-xs text-slate-500 space-y-2">
                            <p>I'am Coder. | &copy; {new Date().getFullYear()} Downloader System</p>
                            <p className="text-slate-400">
                                Developed with <i data-lucide="heart" className="w-3 h-3 inline text-brand-purple fill-brand-purple/20"></i> by 
                                <span className="text-brand-cyan font-bold ml-1 hover:text-brand-purple transition cursor-pointer">@ikbal developer</span>
                            </p>
                        </div>
                    </footer>
                </>
            );
        };

        // --- TAB: SOSIAL MEDIA ---
        const SosmedDownloader = () => {
            const [url, setUrl] = useState('');
            const [loading, setLoading] = useState(false);
            const [result, setResult] = useState(null);
            const [error, setError] = useState('');

            const detectPlatform = (url) => {
                if (/youtu(be\.com|\.be)/i.test(url)) return 'youtube';
                if (/tiktok\.com/i.test(url)) return 'tiktok';
                if (/instagram\.com/i.test(url)) return 'instagram';
                if (/facebook\.com|fb\.watch|fb\.com/i.test(url)) return 'facebook';
                return null;
            };

            const handleDownload = async (e) => {
                e.preventDefault();
                setError(''); setResult(null);

                if (!url.trim()) { setError('Harap masukkan link!'); return; }
                const platform = detectPlatform(url);
                if (!platform) { setError('Link tidak didukung. Gunakan link YT, TikTok, IG, atau FB.'); return; }

                setLoading(true);
                try {
                    let fetchUrl = '', response, data;
                    let parsedResult = { platform, items: [] };

                    switch (platform) {
                        case 'tiktok':
                            fetchUrl = `${API_BASE}/sosmed/tiktok?url=${encodeURIComponent(url)}`;
                            response = await fetch(fetchUrl);
                            data = await response.json();
                            if (data.status !== 'success' || !data.data) throw new Error('Video TikTok tidak ditemukan');
                            
                            parsedResult.title = data.data.title || 'Video TikTok';
                            parsedResult.author = `@${data.data.author?.unique_id || 'user'}`;
                            parsedResult.cover = data.data.cover;
                            
                            if (data.data.hdplay) parsedResult.items.push({ label: 'Video HD (No WM)', url: data.data.hdplay });
                            if (data.data.play) parsedResult.items.push({ label: 'Video Normal (No WM)', url: data.data.play });
                            if (data.data.music) parsedResult.items.push({ label: 'Audio / Musik', url: data.data.music, type: 'audio' });
                            break;

                        case 'youtube':
                            fetchUrl = `${API_BASE}/youtube/video?url=${encodeURIComponent(url)}`;
                            response = await fetch(fetchUrl);
                            data = await response.json();
                            if (!data.download_link) throw new Error('Video YouTube tidak ditemukan');

                            parsedResult.title = data.filename.replace(/\s*\(\d+p,?\s*h264\)/gi, '').replace(/\s*\.\w{3,4}$/, '');
                            const links = data.download_link;
                            if (links['1080p']) parsedResult.items.push({ label: 'Video 1080p', url: links['1080p'] });
                            if (links['720p']) parsedResult.items.push({ label: 'Video 720p', url: links['720p'] });
                            if (links['360p']) parsedResult.items.push({ label: 'Video 360p', url: links['360p'] });
                            
                            try {
                                const audioRes = await fetch(`${API_BASE}/youtube/music?url=${encodeURIComponent(url)}`);
                                const audioData = await audioRes.json();
                                if(audioData.download_link && audioData.download_link['320kbps']) {
                                     parsedResult.items.push({ label: 'Audio MP3', url: audioData.download_link['320kbps'], type: 'audio' });
                                }
                            } catch(e) {}
                            break;

                        case 'instagram':
                            fetchUrl = `${API_BASE}/sosmed/instagram?url=${encodeURIComponent(url)}`;
                            response = await fetch(fetchUrl);
                            data = await response.json();
                            if (data.status !== 'success' || !data.video_url) throw new Error('Video IG tidak ditemukan/Private');

                            parsedResult.title = data.description || 'Video Instagram';
                            parsedResult.author = `@${data.username || 'user'}`;
                            parsedResult.items.push({ label: 'Download Video', url: data.video_url });
                            break;

                        case 'facebook':
                            fetchUrl = `${API_BASE}/sosmed/facebook?url=${encodeURIComponent(url)}`;
                            response = await fetch(fetchUrl);
                            data = await response.json();
                            if (data.status !== 'success') throw new Error('Video FB tidak ditemukan');

                            parsedResult.title = data.description || 'Video Facebook';
                            if (data.video_url_hd) parsedResult.items.push({ label: 'Video HD', url: data.video_url_hd });
                            if (data.video_url_sd) parsedResult.items.push({ label: 'Video SD', url: data.video_url_sd });
                            break;
                    }

                    if(parsedResult.items.length === 0) throw new Error('Gagal mendapatkan link download.');
                    setResult(parsedResult);
                } catch (err) {
                    setError(err.message || 'Server sedang sibuk. Coba lagi.');
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="animate-in fade-in duration-500">
                    <div className="text-center mb-8">
                        <h1 className="text-3xl md:text-4xl font-bold mb-3">Sosmed <span className="text-gradient">Downloader</span></h1>
                        <p className="text-slate-400 text-sm">Unduh video dari YouTube, TikTok, Instagram, & Facebook tanpa watermark.</p>
                    </div>

                    <form onSubmit={handleDownload} className="bg-dark-card border border-dark-border p-2 rounded-2xl flex flex-col md:flex-row gap-2 mb-8 relative">
                        <div className="flex-grow flex items-center relative">
                            <i data-lucide="link" className="absolute left-4 w-5 h-5 text-slate-500"></i>
                            <input 
                                type="url" 
                                value={url}
                                onChange={(e) => setUrl(e.target.value)}
                                placeholder="Tempel link video di sini..." 
                                className="w-full bg-dark-input border-none rounded-xl py-4 pl-12 pr-4 text-white placeholder-slate-500 focus:ring-2 focus:ring-brand-purple outline-none"
                            />
                        </div>
                        <button 
                            type="submit" 
                            disabled={loading}
                            className="bg-gradient-primary hover:opacity-90 disabled:opacity-50 text-white font-bold rounded-xl py-4 px-8 flex justify-center items-center gap-2 transition"
                        >
                            {loading ? <i data-lucide="loader-2" className="w-5 h-5 animate-spin"></i> : <i data-lucide="download" className="w-5 h-5"></i>}
                            {loading ? 'Proses...' : 'Proses'}
                        </button>
                    </form>

                    {error && (
                        <div className="bg-red-900/30 border border-red-500/50 text-red-400 p-4 rounded-xl mb-8 flex items-center gap-3">
                            <i data-lucide="alert-triangle" className="w-5 h-5"></i> {error}
                        </div>
                    )}

                    {result && (
                        <div className="bg-dark-card border border-dark-border rounded-2xl p-6 flex flex-col md:flex-row gap-6 animate-in slide-in-from-bottom-4">
                            {result.cover ? (
                                <img src={result.cover} alt="Thumbnail" className="w-full md:w-48 aspect-video md:aspect-square object-cover rounded-xl bg-dark-input" onError={(e) => { e.target.onerror = null; e.target.src = 'https://via.placeholder.com/300?text=No+Image'; }} />
                            ) : (
                                <div className="w-full md:w-48 aspect-video md:aspect-square rounded-xl bg-dark-input flex items-center justify-center border border-dark-border">
                                    <i data-lucide="video" className="w-12 h-12 text-slate-600"></i>
                                </div>
                            )}
                            <div className="flex-grow flex flex-col">
                                <span className="text-xs font-bold uppercase tracking-wider text-brand-cyan mb-1">{result.platform}</span>
                                <h2 className="text-lg font-bold text-white mb-1 line-clamp-2">{result.title}</h2>
                                {result.author && <p className="text-slate-400 text-sm mb-4">{result.author}</p>}
                                
                                <div className="space-y-2 mt-auto">
                                    {result.items.map((item, idx) => (
                                        <a key={idx} href={item.url} target="_blank" rel="noopener noreferrer" className="flex items-center justify-between p-3 rounded-xl bg-dark-input border border-dark-border hover:border-brand-purple transition group">
                                            <div className="flex items-center gap-3">
                                                <i data-lucide={item.type === 'audio' ? 'music' : 'play-circle'} className={`w-5 h-5 ${item.type === 'audio' ? 'text-brand-purple' : 'text-brand-cyan'}`}></i>
                                                <span className="font-medium text-sm text-slate-200">{item.label}</span>
                                            </div>
                                            <div className="bg-slate-800 p-2 rounded-lg group-hover:bg-brand-purple transition">
                                                <i data-lucide="download" className="w-4 h-4 text-white"></i>
                                            </div>
                                        </a>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // --- TAB: MOVIE / ANIME ---
        const MovieDownloader = () => {
            const [query, setQuery] = useState('');
            const [type, setType] = useState('anime'); // 'anime' | 'drakor'
            
            // UI States
            const [view, setView] = useState('search'); // 'search' | 'list' | 'detail'
            const [loading, setLoading] = useState(false);
            const [loadingText, setLoadingText] = useState('');
            const [error, setError] = useState('');
            
            // Data States
            const [list, setList] = useState([]);
            const [movieDetail, setMovieDetail] = useState(null);
            const [episodes, setEpisodes] = useState([]);
            const [streamData, setStreamData] = useState([]); 
            const [selectedEpisodeData, setSelectedEpisodeData] = useState(null); 

            // Disclaimer State
            const [disclaimerTarget, setDisclaimerTarget] = useState(null);

            const searchMovie = async (e) => {
                e.preventDefault();
                if (!query.trim()) return;
                setLoading(true); setLoadingText('Mencari database...'); setError('');
                try {
                    let fetchUrl = type === 'anime' 
                        ? `${API_BASE}/anime/search?query=${encodeURIComponent(query)}&page=1`
                        : `${DRAKOR_API}/search?q=${encodeURIComponent(query)}&limit=15`;
                    
                    const res = await fetch(fetchUrl);
                    const data = await res.json();
                    
                    let results = [];
                    if (type === 'anime') {
                        if (data.data && data.data[0] && data.data[0].result) results = data.data[0].result;
                    } else {
                        if (data.data) results = data.data;
                    }

                    if (results.length === 0) throw new Error('Judul tidak ditemukan.');
                    
                    setList(results);
                    setView('list');
                } catch (err) {
                    setError(err.message);
                } finally {
                    setLoading(false);
                }
            };

            const selectMovie = async (item) => {
                setLoading(true); setLoadingText('Mengambil info detail & episode...'); setError('');
                try {
                    let fetchUrl, res, data;
                    if (type === 'anime') {
                        fetchUrl = `${API_BASE}/anime/detail?series=${encodeURIComponent(item.url)}`;
                        res = await fetch(fetchUrl);
                        data = await res.json();
                        if (!data.data || !data.data[0]) throw new Error('Detail gagal dimuat');
                        
                        const info = data.data[0];
                        setMovieDetail({ title: info.judul, cover: info.cover, genre: info.genre?.join(', '), series_id: info.series_id, desc: info.sinopsis });
                        setEpisodes((info.chapter || []).slice().sort((a,b) => (parseInt(a.ch)||0) - (parseInt(b.ch)||0)));
                    } else {
                        fetchUrl = `${DRAKOR_API}/info?id=${item.id}`;
                        res = await fetch(fetchUrl);
                        let json = await res.json();
                        if (json.status === 1 && json.data) data = json.data; else data = json;
                        if (!data || !data.data_episode) throw new Error('Detail gagal dimuat');

                        setMovieDetail({ title: data.title, cover: data.image || data.thumb, genre: data.category, desc: data.synopsis_clean });
                        setEpisodes(data.data_episode);
                    }
                    setView('detail');
                } catch (err) {
                    setError(err.message);
                } finally {
                    setLoading(false);
                }
            };

            const selectEpisode = async (ep) => {
                setLoading(true); setLoadingText('Mencari link server (proses ini mungkin memakan waktu)...'); setError('');
                setSelectedEpisodeData(ep);
                setStreamData([]);
                try {
                    let fetchUrl, res, data;
                    let resolutions = [];

                    if (type === 'anime') {
                        const epNum = extractEpNumber(ep);
                        fetchUrl = `${API_BASE}/anime/stream?slug=${encodeURIComponent(ep.url)}&series=${movieDetail.series_id}&episode=${epNum}`;
                        res = await fetch(fetchUrl);
                        data = await res.json();
                        const streamInfo = data.data[0];
                        if (!streamInfo) throw new Error('Stream tidak tersedia');

                        (streamInfo.reso || []).forEach(r => {
                            const streams = streamInfo.streams[r];
                            if (streams && streams.length > 0) {
                                const valid = streams.filter(s => s.link && s.link.startsWith('http'));
                                if(valid.length > 0) {
                                    resolutions.push({ resolution: r, url: valid[0].link, size: streamInfo.resoSize?.[r] || '~' });
                                }
                            }
                        });
                    } else {
                        fetchUrl = `${DRAKOR_API}/stream?id=${ep.episode_id}`;
                        res = await fetch(fetchUrl);
                        let json = await res.json();
                        if (json.status === 1 && json.data) data = json.data; else data = json;
                        
                        let actualStream = null;
                        if (data.data_stream && data.data_stream.length > 0) actualStream = data.data_stream[0];
                        else if (data['360p'] || data['480p']) actualStream = data;

                        if (!actualStream) throw new Error('Stream tidak tersedia');

                        ['360p', '480p', '720p', '1080p'].forEach(q => {
                            if (actualStream[q]) {
                                resolutions.push({ resolution: q, url: actualStream[q], size: actualStream[`${q}_size`] || '~' });
                            }
                        });
                    }

                    if (resolutions.length === 0) throw new Error('Resolusi tidak ditemukan');
                    setStreamData(resolutions);
                    
                    setTimeout(() => {
                        document.getElementById('stream-section')?.scrollIntoView({ behavior: 'smooth' });
                    }, 200);

                } catch (err) {
                    setError(err.message);
                } finally {
                    setLoading(false);
                }
            };

            const triggerDisclaimer = (resoObj) => {
                setDisclaimerTarget(resoObj);
            };

            const acceptAndDownload = () => {
                if (disclaimerTarget && disclaimerTarget.url) {
                    window.open(disclaimerTarget.url, '_blank');
                }
                setDisclaimerTarget(null);
            };

            return (
                <div className="relative animate-in fade-in duration-500">
                    
                    {/* Fullscreen Loader Overlay */}
                    {loading && (
                        <div className="absolute inset-0 z-10 bg-dark-bg/80 backdrop-blur-sm rounded-3xl flex flex-col items-center justify-center border border-dark-border">
                            <div className="relative w-16 h-16 mb-4">
                                <div className="absolute inset-0 border-4 border-slate-700 rounded-full"></div>
                                <div className="absolute inset-0 border-4 border-brand-cyan rounded-full border-t-transparent animate-spin"></div>
                            </div>
                            <p className="text-brand-cyan font-mono text-sm animate-pulse text-center px-4">{loadingText}</p>
                        </div>
                    )}

                    {/* Disclaimer Modal */}
                    {disclaimerTarget && (
                        <div className="fixed inset-0 z-50 bg-black/90 backdrop-blur-md flex items-center justify-center p-4">
                            <div className="bg-dark-card border border-red-500/50 rounded-2xl max-w-md w-full p-6 shadow-[0_0_50px_rgba(239,68,68,0.15)] animate-in zoom-in-95 duration-200">
                                <div className="flex items-center gap-3 mb-4 text-red-500">
                                    <i data-lucide="alert-octagon" className="w-8 h-8"></i>
                                    <h3 className="text-xl font-bold font-mono">PERINGATAN ILEGAL</h3>
                                </div>
                                <div className="text-slate-300 text-sm space-y-3 mb-6 bg-dark-input p-4 rounded-xl border border-dark-border">
                                    <p>Mengunduh konten berhak cipta secara tidak resmi adalah tindakan <strong>ilegal</strong>.</p>
                                    <p>Dengan menekan tombol Setuju, Anda menyadari bahwa:</p>
                                    <ul className="list-disc pl-5 space-y-1 text-slate-400">
                                        <li>Web ini hanyalah alat (perantara API).</li>
                                        <li className="text-red-400 font-semibold">Developer / Owner tidak bertanggung jawab atas DOSA maupun konsekuensi hukum yang terjadi.</li>
                                        <li>Risiko sepenuhnya ditanggung sendiri.</li>
                                    </ul>
                                </div>
                                <div className="flex gap-3">
                                    <button onClick={() => setDisclaimerTarget(null)} className="flex-1 bg-slate-800 hover:bg-slate-700 text-white py-3 rounded-xl font-semibold transition">Batal</button>
                                    <button onClick={acceptAndDownload} className="flex-1 bg-red-600 hover:bg-red-700 text-white py-3 rounded-xl font-semibold shadow-[0_0_15px_rgba(239,68,68,0.4)] transition">Setuju & Download</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="text-center mb-8">
                        <h1 className="text-3xl md:text-4xl font-bold mb-3">Movie <span className="text-gradient">Explorer</span></h1>
                        <p className="text-slate-400 text-sm">Cari dan temukan Anime atau Drama Korea favorit Anda.</p>
                    </div>

                    {/* Search Bar dgn Toggle Icons Button pengganti Select Emoji */}
                    <form onSubmit={searchMovie} className="bg-dark-card border border-dark-border p-2 rounded-2xl flex flex-col md:flex-row gap-2 mb-8">
                        <div className="flex bg-dark-input rounded-xl p-1 md:w-64 flex-shrink-0">
                            <button 
                                type="button" 
                                onClick={() => setType('anime')}
                                className={`flex-1 flex items-center justify-center gap-2 px-3 py-3 rounded-lg text-sm font-semibold transition ${type === 'anime' ? 'bg-slate-700 text-white shadow-sm' : 'text-slate-500 hover:text-slate-300'}`}
                            >
                                <i data-lucide="tv" className="w-4 h-4"></i> Anime
                            </button>
                            <button 
                                type="button" 
                                onClick={() => setType('drakor')}
                                className={`flex-1 flex items-center justify-center gap-2 px-3 py-3 rounded-lg text-sm font-semibold transition ${type === 'drakor' ? 'bg-slate-700 text-white shadow-sm' : 'text-slate-500 hover:text-slate-300'}`}
                            >
                                <i data-lucide="clapperboard" className="w-4 h-4"></i> Drakor
                            </button>
                        </div>

                        <div className="flex-grow relative flex items-center">
                            <i data-lucide="search" className="absolute left-4 w-5 h-5 text-slate-500"></i>
                            <input 
                                type="text" 
                                value={query}
                                onChange={(e) => setQuery(e.target.value)}
                                placeholder={`Cari judul ${type === 'anime' ? 'anime' : 'drama'}...`}
                                className="w-full bg-dark-input border-none rounded-xl py-4 pl-12 pr-4 text-white placeholder-slate-500 focus:ring-2 focus:ring-brand-cyan outline-none"
                            />
                        </div>
                        <button type="submit" disabled={loading} className="bg-gradient-primary text-white font-bold rounded-xl py-4 px-8 hover:opacity-90 transition">
                            Cari
                        </button>
                    </form>

                    {error && (
                        <div className="bg-red-900/30 border border-red-500/50 text-red-400 p-4 rounded-xl mb-8 text-center">
                            {error}
                        </div>
                    )}

                    {/* View: List Results */}
                    {view === 'list' && list.length > 0 && (
                        <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4">
                            {list.map((item, idx) => (
                                <div key={idx} onClick={() => selectMovie(item)} className="bg-dark-card border border-dark-border rounded-xl overflow-hidden hover:border-brand-purple hover:shadow-[0_0_15px_rgba(168,85,247,0.2)] cursor-pointer transition group">
                                    <div className="aspect-[3/4] bg-dark-input relative overflow-hidden flex items-center justify-center">
                                        {/* Image Error Fallback implemented here */}
                                        <img 
                                            src={item.image || item.thumb || item.cover || item.poster || 'https://via.placeholder.com/300x400/1A2235/475569?text=Image+Not+Found'} 
                                            alt="cover" 
                                            className="w-full h-full object-cover group-hover:scale-105 transition duration-500" 
                                            onError={(e) => {
                                                e.target.onerror = null;
                                                e.target.src = 'https://via.placeholder.com/300x400/1A2235/475569?text=Image+Not+Found';
                                            }}
                                        />
                                        <div className="absolute inset-0 bg-gradient-to-t from-[#0B0F19] to-transparent opacity-80"></div>
                                        <div className="absolute bottom-2 left-2 right-2 flex justify-between items-end">
                                            <span className="text-[10px] bg-brand-cyan text-dark-bg px-2 py-0.5 rounded font-bold uppercase">{item.status || type}</span>
                                        </div>
                                    </div>
                                    <div className="p-3">
                                        <h3 className="font-semibold text-sm line-clamp-2 leading-tight text-slate-200">{item.judul || item.title}</h3>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}

                    {/* View: Detail & Episodes */}
                    {view === 'detail' && movieDetail && (
                        <div className="space-y-6">
                            <button onClick={() => setView('list')} className="text-slate-400 hover:text-white flex items-center gap-2 text-sm font-mono mb-2">
                                <i data-lucide="arrow-left" className="w-4 h-4"></i> Kembali ke hasil
                            </button>
                            
                            <div className="bg-dark-card border border-dark-border rounded-2xl p-6 flex flex-col md:flex-row gap-6">
                                <img 
                                    src={movieDetail.cover || 'https://via.placeholder.com/300x400/1A2235/475569?text=No+Cover'} 
                                    alt="Cover" 
                                    className="w-full md:w-48 aspect-[3/4] rounded-xl object-cover shadow-lg border border-slate-800" 
                                    onError={(e) => {
                                        e.target.onerror = null;
                                        e.target.src = 'https://via.placeholder.com/300x400/1A2235/475569?text=No+Cover';
                                    }}
                                />
                                <div>
                                    <h2 className="text-2xl md:text-3xl font-bold mb-2 text-transparent bg-clip-text bg-gradient-to-r from-white to-slate-400">{movieDetail.title}</h2>
                                    <div className="flex gap-2 flex-wrap mb-4">
                                        <span className="bg-slate-800 text-slate-300 text-xs px-3 py-1 rounded-full border border-slate-700">{movieDetail.genre || 'Unknown Genre'}</span>
                                        <span className="bg-brand-purple/20 text-brand-purple text-xs px-3 py-1 rounded-full border border-brand-purple/30">{episodes.length} Episodes</span>
                                    </div>
                                    <p className="text-slate-400 text-sm leading-relaxed line-clamp-4 md:line-clamp-none">{movieDetail.desc || 'Tidak ada sinopsis.'}</p>
                                </div>
                            </div>

                            <div className="bg-dark-card border border-dark-border rounded-2xl p-6">
                                <h3 className="font-mono text-lg font-bold mb-4 flex items-center gap-2">
                                    <i data-lucide="list-video" className="w-5 h-5 text-brand-cyan"></i> List Episode
                                </h3>
                                <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-3 max-h-96 overflow-y-auto custom-scrollbar pr-2">
                                    {episodes.map((ep, idx) => {
                                        const label = type === 'anime' ? `Episode ${ep.ch}` : (ep.episode_label || `Ep ${idx+1}`);
                                        return (
                                            <button 
                                                key={idx} 
                                                onClick={() => selectEpisode(ep)}
                                                className="bg-dark-input border border-dark-border hover:border-brand-cyan hover:bg-slate-800 text-slate-300 py-3 rounded-xl text-sm font-medium transition"
                                            >
                                                {label}
                                            </button>
                                        );
                                    })}
                                </div>
                            </div>

                            {/* Stream Options Section */}
                            {streamData.length > 0 && selectedEpisodeData && (
                                <div id="stream-section" className="bg-dark-card border border-brand-cyan/50 rounded-2xl p-6 shadow-[0_0_20px_rgba(0,229,255,0.05)] animate-in slide-in-from-bottom-4">
                                    <h3 className="font-mono text-lg font-bold mb-1 flex items-center gap-2">
                                        <i data-lucide="monitor-play" className="w-5 h-5 text-brand-cyan"></i> Pilih Resolusi Download
                                    </h3>
                                    <p className="text-slate-400 text-sm mb-6">
                                        {type === 'anime' ? `Episode ${selectedEpisodeData.ch}` : selectedEpisodeData.episode_label}
                                    </p>
                                    
                                    <div className="flex flex-col gap-3">
                                        {streamData.map((stream, idx) => (
                                            <div key={idx} className="flex flex-col md:flex-row md:items-center justify-between bg-dark-input border border-dark-border p-4 rounded-xl">
                                                <div className="flex items-center gap-4 mb-3 md:mb-0">
                                                    <div className="bg-slate-800 p-3 rounded-lg">
                                                        <i data-lucide="video" className="w-5 h-5 text-brand-cyan"></i>
                                                    </div>
                                                    <div>
                                                        <div className="font-bold text-slate-200">{stream.resolution}</div>
                                                        <div className="text-xs text-slate-500 uppercase tracking-widest">{stream.size || '~'}</div>
                                                    </div>
                                                </div>
                                                <button 
                                                    onClick={() => triggerDisclaimer(stream)}
                                                    className="bg-slate-800 hover:bg-brand-purple text-white border border-slate-700 hover:border-brand-purple px-6 py-2.5 rounded-lg text-sm font-semibold transition flex items-center justify-center gap-2"
                                                >
                                                    <i data-lucide="download-cloud" className="w-4 h-4"></i> Download
                                                </button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
